<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xavi & Cris · Nuestra Boda · Abril 2027</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Allura&family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* -------------------------
   PALETA MEDITERRANEA
------------------------- */

:root{
    --bg: #F5F0E8;          /* crema calido lino */
    --bg-alt: #EBE3D5;      /* beige oscuro */
    --text: #2A2A2A;        /* casi negro */
    --sage: #6B7B5A;        /* verde oliva profundo */
    --sage-light: #8A9878;  /* verde salvia claro */
    --olive: #7B8558;       /* verde oliva calido elegante */
    --terracota: #C4703E;   /* naranja terracota */
    --terracota-dark: #A55B2C;
    --sand: #D4C4A8;        /* arena lino */
    --line: #C9BFA8;
}

/* -------------------------
   RESET
------------------------- */

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    scroll-behavior: smooth;
}

body{
    background: var(--bg);
    color: var(--text);
    font-family: "Lato", sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
}

/* =========================================
   HERO / PORTADA TIPO REVISTA EDITORIAL
========================================= */

.hero{
    min-height: 100vh;
    position: relative;
    background: var(--bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* -------------------------
   BARRA SUPERIOR TIPO REVISTA
------------------------- */

.hero-topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 50px;
    border-bottom: 1px solid var(--line);
    font-family: "Lato", sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
    position: relative;
    z-index: 10;
}

.hero-topbar-left{
    color: var(--terracota);
    font-weight: 700;
}

.hero-topbar-center{
    font-family: "Cormorant Garamond", serif;
    font-size: 1.1rem;
    font-style: italic;
    letter-spacing: 3px;
    text-transform: none;
    color: var(--sage);
}

.hero-topbar-right{
    color: var(--text);
    font-weight: 400;
}

/* -------------------------
   CONTENIDO CENTRAL
------------------------- */

.hero-content{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 25px;
    position: relative;
}

/* Ilustracion de la finca protagonista */
.hero-illustration{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -45%);
    width: 90%;
    max-width: 800px;
    opacity: 0.35;
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 1;
}

.hero-illustration img{
    width: 100%;
    height: auto;
    display: block;
}

.hero-inner{
    text-align: center;
    max-width: 900px;
    width: 100%;
    position: relative;
    z-index: 2;
    animation: fadeIn 2s ease;
}

/* -------------------------
   TITULO PRINCIPAL EDITORIAL
------------------------- */

.hero-eyebrow{
    font-family: "Lato", sans-serif;
    font-size: 0.75rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--terracota);
    margin-bottom: 30px;
    font-weight: 700;
}

.hero-title{
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: 7.5rem;
    line-height: 1;
    letter-spacing: 4px;
    color: var(--olive);
    margin-bottom: 10px;
}

.hero-title .amp{
    font-family: "Allura", cursive;
    font-weight: 400;
    font-size: 8rem;
    color: var(--terracota);
    display: inline-block;
    line-height: 0.5;
    vertical-align: middle;
    margin: 0 20px;
    transform: translateY(-10px);
    letter-spacing: normal;
}

/* -------------------------
   SUBTITULO
------------------------- */

.hero-subtitle{
    margin-top: 30px;
    text-align: center;
}

.hero-subtitle-day{
    font-family: "Lato", sans-serif;
    font-weight: 400;
    font-size: 0.8rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--terracota);
    margin-bottom: 15px;
}

.hero-subtitle-date{
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    font-size: 2.2rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
}

/* -------------------------
   CITA EDITORIAL
------------------------- */

.hero-quote{
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.4rem;
    color: var(--text);
    margin: 60px auto 0;
    max-width: 550px;
    letter-spacing: 1px;
    line-height: 1.5;
    position: relative;
}

.hero-quote::after{
    content: "";
    display: block;
    width: 40px;
    height: 1px;
    background: var(--terracota);
    margin: 25px auto;
}

/* -------------------------
   BARRA INFERIOR TIPO REVISTA
------------------------- */

.hero-bottombar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 50px;
    border-top: 1px solid var(--line);
    font-family: "Lato", sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
    background: var(--bg);
    position: relative;
    z-index: 10;
}

.hero-bottombar-left{
    display: flex;
    align-items: center;
    gap: 15px;
}

.hero-bottombar-left .dot{
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--terracota);
    border-radius: 50%;
}

.hero-bottombar-center{
    font-family: "Cormorant Garamond", serif;
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: none;
    font-style: italic;
    color: var(--sage);
}

.hero-bottombar-right{
    font-weight: 700;
    color: var(--terracota);
}

/* -------------------------
   ELEMENTOS DECORATIVOS
------------------------- */

.hero-side-text-left,
.hero-side-text-right{
    position: absolute;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-family: "Lato", sans-serif;
    font-size: 0.7rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--sage);
    white-space: nowrap;
    z-index: 5;
}

.hero-side-text-left{
    left: 20px;
    transform: translateY(-50%) rotate(-90deg);
    transform-origin: left center;
}

.hero-side-text-right{
    right: 20px;
    transform: translateY(-50%) rotate(90deg);
    transform-origin: right center;
}

/* -------------------------
   ANIMACIONES
------------------------- */

@keyframes fadeIn{
    from{
        opacity: 0;
        transform: translateY(30px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================================
   RESPONSIVE MOVIL
========================================= */

@media (max-width: 900px){

    .hero-topbar,
    .hero-bottombar{
        padding: 20px 25px;
        flex-direction: column;
        gap: 8px;
        text-align: center;
    }

    .hero-topbar-center,
    .hero-bottombar-center{
        font-size: 0.9rem;
    }

    .hero-title{
        font-size: 3.8rem;
        letter-spacing: 3px;
    }

    .hero-title .amp{
        font-size: 4.5rem;
        margin: 0 12px;
    }

    .hero-subtitle-day{
        font-size: 0.7rem;
        letter-spacing: 5px;
    }

    .hero-subtitle-date{
        font-size: 1.5rem;
        letter-spacing: 4px;
    }

    .hero-quote{
        font-size: 1.1rem;
        padding: 0 20px;
    }

    .hero-side-text-left,
    .hero-side-text-right{
        display: none;
    }

    .hero-illustration{
        width: 130%;
        opacity: 0.25;
    }

}

@media (max-width: 500px){

    .hero-title{
        font-size: 3rem;
    }

    .hero-title .amp{
        font-size: 3.8rem;
    }

    .hero-eyebrow{
        font-size: 0.7rem;
        letter-spacing: 5px;
    }

}

</style>

</head>

<body>

    <!-- ============================
         HERO / PORTADA TIPO REVISTA
    ============================= -->
    <section class="hero">

        <!-- BARRA SUPERIOR -->
        <div class="hero-topbar">
            <div class="hero-topbar-left"></div>
            <div class="hero-topbar-center"></div>
            <div class="hero-topbar-right">Valencia</div>
        </div>

        <!-- CONTENIDO CENTRAL -->
        <div class="hero-content">

            <!-- Textos laterales verticales -->
            <div class="hero-side-text-left">Una historia de amor</div>
            <div class="hero-side-text-right">Xavi &amp; Cris · 2027</div>

            <!-- Ilustracion protagonista -->
            <div class="hero-illustration">
                <img src="img/finca.png" alt="">
            </div>

            <div class="hero-inner">

                <p class="hero-eyebrow">· Nuestra Boda ·</p>

                <h1 class="hero-title">
                    XAVI<span class="amp">&amp;</span>CRIS
                </h1>

                <div class="hero-subtitle">
                    <p class="hero-subtitle-day">· Sábado ·</p>
                    <p class="hero-subtitle-date">3 · Abril · 2027</p>
                </div>

                <p class="hero-quote">
                    Que el corazón no se pase de moda
                </p>

            </div>

        </div>

        <!-- BARRA INFERIOR -->
        <div class="hero-bottombar">
            <div class="hero-bottombar-left">
                <span class="dot"></span>
                <span>Guarda nuestro día</span>
            </div>
            <div class="hero-bottombar-center">
                Desliza para descubrir
            </div>
            <div class="hero-bottombar-right">
                03 · 04 · 27
            </div>
        </div>

    </section>

</body>
</html>
